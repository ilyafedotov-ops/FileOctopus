name: Security Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".cargo/audit.toml"
      - "scripts/pre-push-audit.sh"
      - ".github/workflows/security-audit.yml"

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: cargo install cargo-audit --locked
      - run: bash scripts/pre-push-audit.sh
