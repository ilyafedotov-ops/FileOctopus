name: E2E Tauri (manual)

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: e2e-tauri-manual
  cancel-in-progress: true

jobs:
  e2e-tauri:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 10.26.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: sudo apt-get update
      - run: sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev webkit2gtk-driver xvfb
      - run: cargo install tauri-driver --locked
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fileoctopus/ts-api build
      - run: pnpm --filter @fileoctopus/ui build
      - run: pnpm --filter @fileoctopus/frontend build
      - run: pnpm --filter @fileoctopus/desktop-tauri build
      - run: cargo build --manifest-path apps/desktop-tauri/src-tauri/Cargo.toml
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 1
      - run: pnpm test:e2e:tauri
        env:
          TAURI_DRIVER_VERBOSE: "1"
          WDIO_LOG_LEVEL: warn
      - name: Upload tauri-driver logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tauri-e2e-logs
          path: e2e-tauri/logs
          if-no-files-found: ignore
          retention-days: 3
