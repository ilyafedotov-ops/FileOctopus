name: E2E Tauri (manual)

on:
  workflow_dispatch:

concurrency:
  group: e2e-tauri-manual
  cancel-in-progress: true

jobs:
  e2e-tauri:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update
      - run: sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev webkit2gtk-driver xvfb
      - run: cargo install tauri-driver --locked
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fileoctopus/ts-api build
      - run: pnpm --filter @fileoctopus/ui build
      - run: pnpm --filter @fileoctopus/frontend build
      - run: pnpm --filter @fileoctopus/desktop-tauri build
      - run: cargo build --manifest-path apps/desktop-tauri/src-tauri/Cargo.toml
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 1
      - run: pnpm test:e2e:tauri
        env:
          TAURI_DRIVER_VERBOSE: "1"
          WDIO_LOG_LEVEL: warn
      - name: Upload tauri-driver logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: tauri-e2e-logs
          path: e2e-tauri/logs
          if-no-files-found: ignore
          retention-days: 3
