name: Prerelease Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Prerelease tag in vX.Y.Z format"
        required: true
        default: "v0.1.5"
      commit_sha:
        description: "Exact protected main commit to build"
        required: true

permissions:
  contents: read

concurrency:
  group: prerelease-assets-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0
      - name: Verify protected main dispatch
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.commit_sha }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          if [[ ! "$REQUESTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "requested commit must be a full lowercase commit SHA" >&2
            exit 1
          fi
          if [[ "$WORKFLOW_REF" != "refs/heads/main" || "$WORKFLOW_SHA" != "$REQUESTED_SHA" ]]; then
            echo "requested commit must match the protected main workflow commit" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$REQUESTED_SHA" ]]; then
            echo "checkout does not match requested commit" >&2
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - id: version
        name: Verify release identity
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          REQUESTED_SHA: ${{ inputs.commit_sha }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          node scripts/release-guard.mjs identity
          existing_tag="$(git ls-remote --refs origin "refs/tags/$RELEASE_TAG")"
          if [[ -n "$existing_tag" ]]; then
            echo "release tag already exists" >&2
            exit 1
          fi

  checks:
    needs: validate
    uses: ./.github/workflows/ci.yml
    with:
      checkout_ref: ${{ inputs.commit_sha }}

  build-assets:
    needs: [validate, checks]
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            artifact: macos-arm64
            os: macos-15
            rust_host: aarch64-apple-darwin
          - name: macOS Intel
            artifact: macos-x64
            os: macos-15-intel
            rust_host: x86_64-apple-darwin
          - name: Windows x64
            artifact: windows-x64
            os: windows-2022
            rust_host: x86_64-pc-windows-msvc
          - name: Linux x64
            artifact: linux-x64
            os: ubuntu-22.04
            rust_host: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.commit_sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - name: Verify checkout and build architecture
        shell: bash
        env:
          EXPECTED_RUST_HOST: ${{ matrix.rust_host }}
          REQUESTED_SHA: ${{ inputs.commit_sha }}
        run: |
          if [[ "$(git rev-parse HEAD)" != "$REQUESTED_SHA" ]]; then
            echo "checkout does not match requested commit" >&2
            exit 1
          fi
          actual_rust_host="$(rustc -vV | sed -n 's/^host: //p')"
          if [[ "$actual_rust_host" != "$EXPECTED_RUST_HOST" ]]; then
            echo "runner architecture does not match artifact label" >&2
            exit 1
          fi
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri:build
        env:
          FILEOCTOPUS_COMMIT_SHA: ${{ inputs.commit_sha }}
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.artifact }}
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
          if-no-files-found: error
          retention-days: 14

  prepare-release:
    needs: [validate, build-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.commit_sha }}
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: Normalize and verify release assets
        env:
          ARTIFACTS_DIR: artifacts
          RELEASE_DIR: payload
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          REQUESTED_SHA: ${{ inputs.commit_sha }}
        run: node scripts/release-guard.mjs stage
      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: payload
          format: spdx-json
          output-file: FileOctopus-${{ needs.validate.outputs.version }}.spdx.json
          upload-artifact: false
      - name: Generate release checksums
        shell: bash
        env:
          CHECKSUM_PATH: payload/SHA256SUMS
          RELEASE_DIR: payload
          SBOM_SOURCE: FileOctopus-${{ needs.validate.outputs.version }}.spdx.json
        run: |
          mv -- "$SBOM_SOURCE" payload/
          node scripts/release-guard.mjs checksums
      - uses: actions/upload-artifact@v7
        with:
          name: release-payload
          path: payload/*
          if-no-files-found: error
          retention-days: 14

  publish-prerelease:
    needs: [validate, prepare-release]
    runs-on: ubuntu-latest
    environment: prerelease
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.commit_sha }}
      - uses: actions/download-artifact@v8
        with:
          name: release-payload
          path: payload
      - name: Verify release payload checksums
        shell: bash
        run: |
          if find payload -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "release payload contains a non-file entry" >&2
            exit 1
          fi
          diff -u \
            <(find payload -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' | LC_ALL=C sort) \
            <(sed -E 's/^[0-9a-f]{64}  //' payload/SHA256SUMS | LC_ALL=C sort)
          (cd payload && sha256sum --check SHA256SUMS)
      - name: Attest release provenance
        uses: actions/attest@v4
        with:
          subject-path: payload/*
      - name: Attest release SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            payload/FileOctopus-*-macos-*
            payload/FileOctopus-*-windows-*
            payload/FileOctopus-*-linux-*
          sbom-path: payload/FileOctopus-${{ needs.validate.outputs.version }}.spdx.json
      - name: Create atomic prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          REQUESTED_SHA: ${{ inputs.commit_sha }}
        run: |
          existing_tag="$(git ls-remote --refs origin "refs/tags/$RELEASE_TAG")"
          if [[ -n "$existing_tag" ]]; then
            echo "release tag already exists" >&2
            exit 1
          fi
          mapfile -d '' files < <(find payload -maxdepth 1 -type f -print0 | sort -z)
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            --raw-field ref="refs/tags/$RELEASE_TAG" \
            --raw-field sha="$REQUESTED_SHA"
          git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          if [[ "$(git rev-list -n 1 "$RELEASE_TAG")" != "$REQUESTED_SHA" ]]; then
            echo "created tag does not match requested commit" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" "${files[@]}" \
            --verify-tag \
            --prerelease \
            --latest=false \
            --generate-notes \
            --title "FileOctopus $RELEASE_TAG prerelease"
          if [[ "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" != "true" ]]; then
            echo "release was not published as a prerelease" >&2
            exit 1
          fi
