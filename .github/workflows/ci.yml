name: CI

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: "Exact commit to validate"
        required: false
        type: string
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".gitattributes"
      - ".node-version"
      - "rust-toolchain.toml"
      - "scripts/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".gitattributes"
      - ".node-version"
      - "rust-toolchain.toml"
      - "scripts/**"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ inputs.checkout_ref || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:release-pipeline
      - run: pnpm format:check
      - run: pnpm test:frontend:rc

  backend:
    name: Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-15-intel]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - if: runner.os == 'Linux'
        run: sudo apt-get update
      - if: runner.os == 'Linux'
        run: sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm test:backend:rc
      - if: runner.os == 'Linux'
        run: pnpm check:ipc-types
