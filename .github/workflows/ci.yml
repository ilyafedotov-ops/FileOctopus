name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update
      - run: sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  release-candidate:
    runs-on: ubuntu-latest
    needs:
      - rust
      - frontend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update
      - run: sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: pnpm rc:validate
      - run: FILEOCTOPUS_COMMIT_SHA=${{ github.sha }} pnpm tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: fileoctopus-linux-rc
          path: target/release/bundle
          if-no-files-found: error

  e2e-tauri:
    # Non-blocking smoke against the real Tauri binary via tauri-driver +
    # WebKitWebDriver. Runs only on main pushes (and manual dispatch) so
    # PR gating stays fast. continue-on-error keeps merges green while the
    # upstream tauri-driver 2.0.6 + WebKitGTK 4.1 session-hang is open;
    # remove that flag once the bridge works end-to-end.
    if: github.event_name != 'pull_request'
    continue-on-error: true
    runs-on: ubuntu-latest
    needs:
      - rust
      - frontend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update
      - run: sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev webkit2gtk-driver xvfb
      - run: cargo install tauri-driver --locked
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fileoctopus/ts-api build
      - run: pnpm --filter @fileoctopus/ui build
      - run: pnpm --filter @fileoctopus/frontend build
      - run: pnpm --filter @fileoctopus/desktop-tauri build
      - run: cargo build --manifest-path apps/desktop-tauri/src-tauri/Cargo.toml
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 1
      - name: Run Tauri WebView smoke tests
        run: pnpm test:e2e:tauri
        env:
          TAURI_DRIVER_VERBOSE: "1"
          WDIO_LOG_LEVEL: warn
      - name: Upload tauri-driver logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-e2e-logs
          path: e2e-tauri/logs
          if-no-files-found: ignore
