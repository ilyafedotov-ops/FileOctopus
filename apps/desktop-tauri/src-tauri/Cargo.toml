[package]
name = "fileoctopus-desktop"
version = "0.1.0"
description = "FileOctopus desktop shell"
authors = ["Ilya Fedotov"]
edition = "2021"

[lib]
name = "fileoctopus_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
app-core = { path = "../../../crates/app-core" }
app-ipc = { path = "../../../crates/app-ipc" }
config = { path = "../../../crates/config" }
chrono = "0.4"
fs-core = { path = "../../../crates/fs-core" }
jobs = { path = "../../../crates/jobs" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
telemetry = { path = "../../../crates/telemetry" }
tokio = { version = "1", features = ["sync", "time"] }
uuid = { version = "1", features = ["v4"] }
vfs = { path = "../../../crates/vfs" }
zip = "0.6"
