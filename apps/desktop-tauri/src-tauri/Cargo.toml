[package]
name = "fileoctopus-desktop"
version = "0.1.0"
description = "FileOctopus desktop shell"
authors = ["Ilya Fedotov"]
edition = "2021"

[lib]
name = "fileoctopus_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
